body{

    background:#060818;
    color:#fff;
    font-family:Arial,sans-serif;
}

.header{
    background:#0d1024;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

video{
    width:100%;

.segment{

}

.segment h2{
    text-align:center;
    margin-bottom:20px;
}

.channel-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.channel-card{
    text-align:center;
    cursor:pointer;
}

.logo{
    width:85px;
    height:85px;
    border-radius:50%;
    overflow:hidden;
    background:#fff;
    margin:auto;
    border:3px solid #444;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.channel-name{
    margin-top:8px;
    font-size:14px;
}

.channel-type{
    color:#aaa;
    font-size:12px;
}

.channel-card:hover{
    transform:scale(1.05);
}

@media(max-width:600px){
.channel-grid{
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}
.logo{
    width:75px;
    height:75px;

}

<script>
function playChannel(url){
    const video=document.getElementById("video");

    if(Hls.isSupported()){
        const hls=new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }else{
        video.src=url;
    }
}
</script>
